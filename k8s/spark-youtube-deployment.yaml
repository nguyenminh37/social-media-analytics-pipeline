apiVersion: apps/v1
kind: Deployment
metadata:
  name: social-media-spark-youtube
spec:
  replicas: 1
  selector:
    matchLabels:
      app: social-media-spark-youtube
  template:
    metadata:
      labels:
        app: social-media-spark-youtube
    spec:
      containers:
        - name: spark
          image: social-media-spark:stable-demo
          imagePullPolicy: Never
          envFrom:
            - configMapRef:
                name: pipeline-runtime-config
          env:
            - name: PYSPARK_PYTHON
              value: python
            - name: PYTHONPATH
              value: /opt/social-media-analytics
            - name: RESET_CHECKPOINT_ON_START
              value: "false"
            - name: SPARK_RESOLVE_PACKAGES
              value: "false"
            - name: YOUTUBE_CHECKPOINT_BASE
              value: s3a://checkpoints/youtube_stream_processor
          command:
            - /bin/bash
            - -lc
            - |
              spark-submit /opt/social-media-analytics/spark_jobs/youtube/stream_processor.py
