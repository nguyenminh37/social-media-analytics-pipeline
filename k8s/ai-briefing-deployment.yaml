apiVersion: apps/v1
kind: Deployment
metadata:
  name: social-media-ai-briefing
spec:
  replicas: 1
  selector:
    matchLabels:
      app: social-media-ai-briefing
  template:
    metadata:
      labels:
        app: social-media-ai-briefing
    spec:
      containers:
        - name: ai-briefing
          image: social-media-collector:stable-demo
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: pipeline-runtime-config
          env:
            - name: GEMINI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: external-api-keys
                  key: GEMINI_API_KEY
                  optional: true
          command: ["python", "-m", "ai_insights.hourly_trend_summarizer"]
