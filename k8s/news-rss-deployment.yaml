apiVersion: apps/v1
kind: Deployment
metadata:
  name: social-media-news-rss
spec:
  replicas: 1
  selector:
    matchLabels:
      app: social-media-news-rss
  template:
    metadata:
      labels:
        app: social-media-news-rss
    spec:
      containers:
        - name: collector
          image: social-media-collector:stable-demo
          imagePullPolicy: Never
          envFrom:
            - configMapRef:
                name: pipeline-runtime-config
          command: ["python", "-m", "collectors.public_content.rss"]
