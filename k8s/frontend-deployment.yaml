apiVersion: apps/v1
kind: Deployment
metadata:
  name: social-media-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: social-media-frontend
  template:
    metadata:
      labels:
        app: social-media-frontend
    spec:
      containers:
        - name: frontend
          image: social-media-frontend:stable-demo
          imagePullPolicy: Never
          env:
            - name: ANALYTICS_API_BASE_URL
              value: "http://social-media-serving-api:8081"
            - name: PORT
              value: "3001"
            - name: HOSTNAME
              value: "0.0.0.0"
          ports:
            - containerPort: 3001
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3001
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3001
            initialDelaySeconds: 30
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: social-media-frontend
spec:
  type: NodePort
  selector:
    app: social-media-frontend
  ports:
    - name: http
      port: 3001
      targetPort: 3001
      nodePort: 32001
