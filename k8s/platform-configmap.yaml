apiVersion: v1
kind: ConfigMap
metadata:
  name: pipeline-runtime-config
data:
  KAFKA_BOOTSTRAP_SERVERS: social-media-kafka:9092
  KAFKA_STARTING_OFFSETS: earliest
  KAFKA_RAW_YOUTUBE_VIDEOS_TOPIC: raw_youtube_videos
  KAFKA_RAW_YOUTUBE_COMMENTS_TOPIC: raw_youtube_comments
  KAFKA_RAW_YOUTUBE_CHANNELS_TOPIC: raw_youtube_channels
  KAFKA_RAW_NEWS_ARTICLES_TOPIC: raw_news_articles
  KAFKA_RAW_YOUTUBE_RSS_VIDEOS_TOPIC: raw_youtube_rss_videos
  KAFKA_SILVER_YOUTUBE_CONTENT_EVENTS_TOPIC: silver_youtube_content_events
  KAFKA_SILVER_YOUTUBE_CHANNEL_SNAPSHOTS_TOPIC: silver_youtube_channel_snapshots
  KAFKA_SILVER_PUBLIC_CONTENT_EVENTS_TOPIC: silver_public_content_events
  KAFKA_YOUTUBE_AGGREGATED_METRICS_TOPIC: youtube_aggregated_metrics
  KAFKA_PUBLIC_TREND_METRICS_TOPIC: public_trend_metrics
  KAFKA_PUBLIC_TREND_ALERTS_TOPIC: public_trend_alerts
  YOUTUBE_REGION_CODE: VN
  YOUTUBE_MAX_TRENDING_VIDEOS: "50"
  YOUTUBE_MAX_COMMENTS_PER_VIDEO: "100"
  YOUTUBE_FETCH_INTERVAL_SECONDS: "300"
  NEWS_RSS_FETCH_INTERVAL_SECONDS: "300"
  YOUTUBE_RSS_FETCH_INTERVAL_SECONDS: "600"
  MINIO_ENDPOINT: http://social-media-minio:9000
  MINIO_ACCESS_KEY: minioadmin
  MINIO_SECRET_KEY: minioadmin123
  MONGO_URI: mongodb://social-media-mongodb:27017
  MONGO_DATABASE: analytics
  ELASTICSEARCH_HOST: http://social-media-elasticsearch:9200
  ENABLE_MINIO_SINK: "false"
  ENABLE_MONGO_SINK: "true"
  ENABLE_ES_SINK: "true"
  ENABLE_KAFKA_SINK: "true"
  ENABLE_FULL_TREND_METRICS_SINK: "true"
  MONGO_YOUTUBE_CONTENT_EVENTS_COLLECTION: youtube_content_events
  MONGO_YOUTUBE_CHANNEL_SNAPSHOTS_COLLECTION: youtube_channel_snapshots
  MONGO_YOUTUBE_SENTIMENT_COLLECTION: youtube_sentiment_metrics
  MONGO_YOUTUBE_TRENDING_COLLECTION: youtube_trending_topics
  MONGO_PUBLIC_CONTENT_EVENTS_COLLECTION: public_content_events
  MONGO_PUBLIC_TREND_METRICS_COLLECTION: public_trend_metrics
  MONGO_PUBLIC_TREND_ALERTS_COLLECTION: public_trend_alerts
  ELASTICSEARCH_YOUTUBE_CONTENT_EVENTS_INDEX: youtube_content_events
  ELASTICSEARCH_YOUTUBE_CHANNEL_SNAPSHOTS_INDEX: youtube_channel_snapshots
  ELASTICSEARCH_PUBLIC_CONTENT_EVENTS_INDEX: public_content_events
  ELASTICSEARCH_PUBLIC_TREND_METRICS_INDEX: public_trend_metrics
  ELASTICSEARCH_PUBLIC_TREND_ALERTS_INDEX: public_trend_alerts
  AI_BRIEFING_ENABLED: "false"
  SENTIMENT_MODEL_NAME: vnemolex-cc-by-4.0
  SENTIMENT_PROVIDER: lexicon
  SENTIMENT_LEXICON_PATH: /app/config/external/vnemolex_sentiment.json
  SENTIMENT_BATCH_LIMIT: "8"
  ANALYTICS_API_BASE_URL: http://social-media-serving-api:8081
