apiVersion: apps/v1
kind: Deployment
metadata:
  name: social-media-serving-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: social-media-serving-api
  template:
    metadata:
      labels:
        app: social-media-serving-api
    spec:
      containers:
        - name: serving-api
          image: social-media-collector:local
          imagePullPolicy: Never
          command: ["python", "-m", "serving_api.server"]
          env:
            - name: SERVING_API_PORT
              value: "8081"
          envFrom:
            - configMapRef:
                name: pipeline-runtime-config
          ports:
            - containerPort: 8081
---
apiVersion: v1
kind: Service
metadata:
  name: social-media-serving-api
spec:
  selector:
    app: social-media-serving-api
  ports:
    - name: http
      port: 8081
      targetPort: 8081
